name: Veyon -> WinGet PR Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
  repository_dispatch:
    types: [veyon_check_now]

permissions:
  contents: read

concurrency:
  group: veyon-winget
  cancel-in-progress: true

jobs:
  veyon-winget:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Determine latest eligible Veyon installer version
        id: meta
        shell: pwsh
        env:
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
        run: |
          pwsh -File .\Submit-VeyonWingetUpdate.ps1 -CheckOnly

      - name: Send START email (new version found)
        if: steps.meta.outputs.needsUpdate == 'true'
        continue-on-error: true
        uses: dawidd6/action-send-mail@master
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Veyon Update gefunden: ${{ steps.meta.outputs.version }}"
          from: ${{ secrets.MAIL_FROM }}
          to: ${{ secrets.MAIL_TO }}
          body: |
            Neue Veyon-Version gefunden.

            WinGet-Version: ${{ steps.meta.outputs.version }}
            GitHub Release Tag: ${{ steps.meta.outputs.tag }}
            Release Notes: ${{ steps.meta.outputs.notesUrl }}
            Release Date: ${{ steps.meta.outputs.releaseDate }}

            Grund:
            ${{ steps.meta.outputs.reason }}

            Prozess startet jetzt.

      - name: "Info: No update needed"
        if: steps.meta.outputs.needsUpdate != 'true'
        shell: pwsh
        run: |
          Write-Host "Keine neue PR nötig."
          Write-Host "Version: ${{ steps.meta.outputs.version }}"
          Write-Host "Grund: ${{ steps.meta.outputs.reason }}"
          Write-Host "Bestehende PR: ${{ steps.meta.outputs.existingPrUrl }}"

      - name: Install WingetCreate
        if: steps.meta.outputs.needsUpdate == 'true'
        shell: pwsh
        run: |
          winget install -e --id Microsoft.WingetCreate --accept-package-agreements --accept-source-agreements

      - name: Run Submit-VeyonWingetUpdate.ps1 (generate/guard/submit PR)
        if: steps.meta.outputs.needsUpdate == 'true'
        id: submit
        shell: pwsh
        env:
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
        run: |
          $log = Join-Path $env:RUNNER_TEMP "wingetcreate.log"

          pwsh -File .\Submit-VeyonWingetUpdate.ps1 -Version "${{ steps.meta.outputs.version }}" *>&1 | Tee-Object -FilePath $log

          $pr = Select-String -Path $log -Pattern "https://github\.com/microsoft/winget-pkgs/pull/\d+" -AllMatches |
                ForEach-Object { $_.Matches.Value } |
                Select-Object -First 1

          if ($pr) {
            "prUrl=$pr" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Send END email (success/fail)
        if: ${{ always() && steps.meta.outputs.needsUpdate == 'true' }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@master
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Veyon winget Prozess fertig: ${{ job.status }}"
          from: ${{ secrets.MAIL_FROM }}
          to: ${{ secrets.MAIL_TO }}
          body: |
            Status: ${{ job.status }}

            WinGet-Version: ${{ steps.meta.outputs.version }}
            GitHub Release Tag: ${{ steps.meta.outputs.tag }}
            Release Notes: ${{ steps.meta.outputs.notesUrl }}
            Release Date: ${{ steps.meta.outputs.releaseDate }}

            Neue PR: ${{ steps.submit.outputs.prUrl }}
            Bereits offene PR: ${{ steps.meta.outputs.existingPrUrl }}

            Run:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
